---
######################################
### giftpilz0.general.firewalld

firewalld_zones_define:
  - zone: server
    source: 192.168.60.0/24
  - zone: server-kubernetes
    source: 192.168.65.0/24
  - zone: server-lb
    source: 192.168.70.0/24
  - zone: clients
    source: 192.168.10.0/24
  - zone: clients
    source: 192.168.15.0/24
  - zone: iot-untrusted
    source: 192.168.20.0/24

firewalld_rules_services:
  - service: ssh
    zone: clients
    state: enabled

firewalld_rules_ports:
  - port: 8443 # https
    protocol: tcp
    zone: clients
    state: enabled
  - port: 8007 # http
    protocol: tcp
    zone: clients
    state: enabled
  - port: 8443 # https
    protocol: tcp
    zone: server
    state: enabled
  - port: 8007 # http
    protocol: tcp
    zone: server
    state: enabled
  - port: 443 # mqtts
    protocol: tcp
    zone: server
    state: enabled
  - port: 1883 # mqtt
    protocol: tcp
    zone: server
    state: enabled
  - port: 8443 # https
    protocol: tcp
    zone: iot-untrusted
    state: enabled
  - port: 8007 # http
    protocol: tcp
    zone: iot-untrusted
    state: enabled
  - port: 443 # mqtts
    protocol: tcp
    zone: iot-untrusted
    state: enabled
  - port: 1883 # mqtt
    protocol: tcp
    zone: iot-untrusted
    state: enabled

######################################
### giftpilz0.server.podman, giftpilz0.homelab.bumper

podman_user: "container"

# Proxy
bumper_proxy_enabled: false
bumper_proxy_http: ""
bumper_proxy_https: ""
bumper_proxy_no_proxy: ""

# Network
bumper_network_enabled: true
bumper_network_name: "bumper-internal"
bumper_network_driver: "bridge"
bumper_network_internal: false

# Envoy
bumper_envoy_enabled: true
bumper_envoy_version: "1.37"

# SPIRE
bumper_spire_enabled: false
bumper_spire_agent_version: "1.14.2"

# Port mapping
bumper_port_map_enabled: true
bumper_port_map:
  - "443:443"
  - "1883:1883"
  - "5223:5223"
  - "8007:8007"
  - "8443:8443"

bumper_version: "latest"
bumper_commit: "86bf91be27bf23bddc1e122013713d1c8f7ca53a"

bumper_autoupdate: true
