---
######################################
### giftpilz0.general.firewalld

firewalld_zones_define:
  - zone: server
    source: 192.168.60.0/24
  - zone: server-kubernetes
    source: 192.168.65.0/24
  - zone: server-lb
    source: 192.168.70.0/24
  - zone: clients
    source: 192.168.10.0/24
  - zone: clients
    source: 192.168.15.0/24

firewalld_rules_services:
  - service: ssh
    zone: clients
    state: enabled
  - service: http
    zone: clients
    state: enabled
  - service: https
    zone: clients
    state: enabled

######################################
### giftpilz0.server.podman, giftpilz0.homelab.vaultwarden

podman_user: "container"

# Proxy
vaultwarden_proxy_enabled: false
vaultwarden_proxy_http: ""
vaultwarden_proxy_https: ""
vaultwarden_proxy_no_proxy: ""

# Network
vaultwarden_network_enabled: true
vaultwarden_network_name: "vaultwarden-internal"
vaultwarden_network_driver: "bridge"
vaultwarden_network_internal: false

# Envoy
vaultwarden_envoy_enabled: true
vaultwarden_envoy_version: "1.37"

# SPIRE
vaultwarden_spire_enabled: false
vaultwarden_spire_agent_version: "1.14.1"

# Port mapping
vaultwarden_port_map_enabled: true
vaultwarden_port_map:
  - "80:80"

vaultwarden_version: "1.34.3-alpine"

vaultwarden_autoupdate: true

vaultwarden_domain: "https://vaultwarden.nixpi.de/"

######################################
### giftpilz0.homelab.traefik

traefik_http_services:
  - name: vaultwarden
    domain: vaultwarden.nixpi.de
    rule: "Host(`vaultwarden.nixpi.de`)"
    servers:
      - url: "http://vaultwarden-pod:80"
    tls_enabled: true
    acme_enabled: true
    health_check:
      path: "/alive"
      interval: "30s"
