---
podman_user: "container"

######################################
### giftpilz0.container.postgresql (provisioned by giftpilz0.container.forgejo)

# Optional overrides -- network/db wiring is set by the forgejo role itself;
# only host-controllable settings (version pin, exposure, backups) live here.
postgresql_port_map_enabled: true

# Versions
# renovate: datasource=docker depName=postgres
postgresql_version: "18.4-alpine"

# Autoupdate
postgresql_autoupdate: true
postgresql_backup_autoupdate: true

# Backup
postgresql_backup_schedule_hours: 24
postgresql_backup_retention_days: 7
postgresql_backup_compression: 6

######################################
### giftpilz0.container.forgejo

# Proxy
forgejo_proxy_enabled: false
forgejo_proxy_http: ""
forgejo_proxy_https: ""
forgejo_proxy_no_proxy: ""

# Network
forgejo_network_enabled: true
forgejo_network_driver: "bridge"
forgejo_network_internal: false

# Network to join even when _network_enabled: false
forgejo_network_name: "forgejo-internal"

# Versions
# renovate: datasource=docker depName=codeberg.org/forgejo/forgejo
forgejo_version: "15.0.4"

# Autoupdate
forgejo_autoupdate: true

# Environment
forgejo_domain: "forgejo.nixpi.de"
forgejo_oauth_client_id: "forgejo"
forgejo_oauth_domain: "login.nixpi.de/realms/nixpi"
forgejo_oauth_name: "keycloak"
forgejo_oauth_admin_group: "forgejo-admin"

######################################
### giftpilz0.container.traefik

# Proxy
traefik_proxy_enabled: false
traefik_proxy_http: ""
traefik_proxy_https: ""
traefik_proxy_no_proxy: ""

# Version
# renovate: datasource=docker depName=traefik
traefik_version: "v3.7.7"

# Autoupdate
traefik_autoupdate: true

# ACME
traefik_acme_enabled: true
traefik_acme_ca_server: "https://acme-v02.api.letsencrypt.org/directory"
traefik_acme_challenge_type: dns
traefik_acme_dns_provider: "cloudflare"
traefik_acme_eab_enabled: false

# Logging
traefik_log_level: "INFO"

# Podman networks traefik should join to reach backends directly
traefik_networks:
  - forgejo

# HTTP services
traefik_http_services:
  - name: forgejo
    domain: forgejo.nixpi.de
    rule: "Host(`forgejo.nixpi.de`)"
    servers:
      - url: "http://forgejo-pod:3000"
    tls_enabled: true
    acme_enabled: true
