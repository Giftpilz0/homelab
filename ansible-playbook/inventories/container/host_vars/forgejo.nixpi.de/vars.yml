---
######################################
### giftpilz0.general.firewalld

firewalld_zones_define:
  - zone: server
    source: 192.168.60.0/24
  - zone: server-kubernetes
    source: 192.168.65.0/24
  - zone: server-lb
    source: 192.168.70.0/24
  - zone: clients
    source: 192.168.10.0/24
  - zone: clients
    source: 192.168.15.0/24

firewalld_rules_services:
  - service: ssh
    zone: clients
    state: enabled
  - service: http
    zone: clients
    state: enabled
  - service: https
    zone: clients
    state: enabled
  - service: http
    zone: server
    state: enabled
  - service: https
    zone: server
    state: enabled

######################################
### giftpilz0.server.podman, giftpilz0.homelab.forgejo

podman_user: "container"

# Proxy
forgejo_proxy_enabled: false
forgejo_proxy_http: ""
forgejo_proxy_https: ""
forgejo_proxy_no_proxy: ""

# Network
forgejo_network_enabled: true
forgejo_network_name: "forgejo-internal"
forgejo_network_driver: "bridge"
forgejo_network_internal: false

# Envoy
forgejo_envoy_enabled: true
forgejo_envoy_version: "1.37"

# SPIRE
forgejo_spire_enabled: false
forgejo_spire_agent_version: "1.14.1"

# Port mapping
forgejo_port_map_enabled: true
forgejo_port_map:
  - "3000:3000"
  - "2222:2222"

postgresql_version: "18-alpine"
forgejo_version: "14"

forgejo_postgresql_autoupdate: true
forgejo_autoupdate: true

forgejo_domain: "forgejo.nixpi.de"
forgejo_oauth_client_id: "forgejo"
forgejo_oauth_domain: "opencloud.nixpi.de"
forgejo_oauth_name: "opencloud"

######################################
### giftpilz0.homelab.traefik

traefik_http_services:
  - name: forgejo
    domain: forgejo.nixpi.de
    rule: "Host(`forgejo.nixpi.de`)"
    servers:
      - url: "http://forgejo-pod:3000"
    tls_enabled: true
    acme_enabled: true
