---
######################################
### giftpilz0.general.firewalld

firewalld_zones_define:
  - zone: server
    source: 192.168.60.0/24
  - zone: server-kubernetes
    source: 192.168.65.0/24
  - zone: server-lb
    source: 192.168.70.0/24
  - zone: clients
    source: 192.168.10.0/24
  - zone: clients
    source: 192.168.15.0/24
  - zone: iot-trusted
    source: 192.168.30.0/24

firewalld_rules_services:
  - service: ssh
    zone: clients
    state: enabled
  - service: http
    zone: clients
    state: enabled
  - service: https
    zone: clients
    state: enabled

firewalld_rules_ports:
  - port: 9001
    protocol: tcp
    zone: clients
    state: enabled
  - port: 1883
    protocol: tcp
    zone: clients
    state: enabled
  - port: 9001
    protocol: tcp
    zone: iot-trusted
    state: enabled
  - port: 1883
    protocol: tcp
    zone: iot-trusted
    state: enabled
