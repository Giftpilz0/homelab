---
# defaults file for k3s

# renovate: datasource=github-releases depName=k3s-io/k3s versioning=loose
k3s_version: v1.36.0+k3s1

k3s_vip_api_endpoint: "{{ hostvars[groups['k3s'][0]]['ansible_host'] | default(groups['k3s'][0]) }}"
k3s_api_port: 6443

k3s_token: W7hzb52sN7wpDHv2ayzQYfLz4tH2pQvpyg3vKe2iAK577bStCuruqeftKjwkd34
k3s_extra_server_args:
  --tls-san {{ k3s_vip_api_endpoint }} --flannel-backend=none --disable-network-policy --disable-helm-controller --disable metrics-server
  --disable servicelb --disable traefik --selinux

k3s_service_name: k3s.service
k3s_service_state: started
k3s_service_enabled: true

# renovate: datasource=github-releases depName=kube-vip/kube-vip
k3s_kube_vip_tag: v1.1.2
k3s_kube_vip_iface: enp6s18

k3s_service_cidr: 10.43.0.0/16
k3s_cluster_cidr: 10.42.0.0/16

# k3s_proxy_env:
#   HTTP_PROXY: ""
#   HTTPS_PROXY: ""
#   NO_PROXY: ""

k3s_firewalld_state: enabled
k3s_firewalld_zone: kubernetes

k3s_manage_cilium: true

# renovate: datasource=github-releases depName=derailed/k9s extractVersion=^v(?<version>.*)$
k9s_tag: 0.50.18 # noqa: var-naming[no-role-prefix]
# renovate: datasource=github-releases depName=fluxcd/flux2 extractVersion=^v(?<version>.*)$
fluxcli_tag: 2.8.7 # noqa: var-naming[no-role-prefix]
# renovate: datasource=github-releases depName=helm/helm extractVersion=^v(?<version>.*)$
helm_tag: 4.2.0 # noqa: var-naming[no-role-prefix]
# renovate: datasource=helm depName=cilium registryUrl=https://helm.cilium.io
cilium_version: 1.19.4 # noqa: var-naming[no-role-prefix]
