---
# defaults file for fluxcli

fluxcli_bin_state: present
fluxcli_url: https://github.com/fluxcd/flux2/releases/download/v{{ fluxcli_tag }}/flux_{{ fluxcli_tag }}_linux_{{ fluxcli_arch }}.tar.gz
fluxcli_arch: amd64
# renovate: datasource=github-releases depName=fluxcd/flux2 extractVersion=^v(?<version>.*)$
fluxcli_tag: 2.8.8
fluxcli_path: /usr/local/sbin
