---
- name: "Misc: Create Podman config directory"
  become: true
  ansible.builtin.file:
    path: /etc/containers/containers.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Misc: Deploy podman proxy configuration"
  become: true
  ansible.builtin.template:
    src: "misc-pod/proxy.conf.j2"
    dest: "/etc/containers/containers.conf.d/proxy.conf"
    owner: root
    group: root
    mode: "0644"
  when: misc_proxy_enabled

- name: "Misc: Delete quadlet directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/misc-pod"
    state: absent

- name: "Misc: Create build directory"
  become: true
  ansible.builtin.file:
    path: "/tmp/misc-build"
    state: directory
    mode: "0755"

- name: "Misc: Clone misc repository"
  become: true
  ansible.builtin.git:
    repo: "https://forgejo.nixpi.de/moritz/service-misc.git"
    dest: "/tmp/misc-build"
    version: "{{ misc_commit }}"
    force: true
    depth: 1

- name: "Misc: Build custom podman image"
  become: true
  become_user: "{{ podman_user }}"
  containers.podman.podman_image:
    name: "localhost/misc-custom"
    tag: "latest"
    path: "/tmp/misc-build"
    build:
      file: "/tmp/misc-build/docker/docker-minimal/Dockerfile"
      format: oci
      cache: false
      force_rm: true
    force: true
  environment:
    https_proxy: "{{ misc_proxy_https if misc_proxy_enabled else '' }}"
    http_proxy: "{{ misc_proxy_http if misc_proxy_enabled else '' }}"
    no_proxy: "{{ misc_proxy_no_proxy if misc_proxy_enabled else '' }}"
  register: misc_image_build

- name: "Misc: Clean up build directory"
  become: true
  ansible.builtin.file:
    path: "/tmp/misc-build"
    state: absent

- name: "Misc: Enable lingering"
  become: true
  ansible.builtin.command: loginctl enable-linger {{ podman_user }}
  changed_when: true

- name: "Misc: Configure unprivileged port range for rootless containers"
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/99-rootless-ports.conf
    reload: true

- name: "Misc: Create quadlet directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0755"

- name: "Misc: Create directory structure"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/misc-pod/{{ item.path }}"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "{{ item.mode }}"
  with_community.general.filetree: "templates/misc-pod/"
  when: item.state == 'directory'

- name: "Misc: Template quadlet files"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/home/{{ podman_user }}/.config/containers/systemd/misc-pod/{{ item.path }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "{{ item.mode }}"
  with_community.general.filetree: "templates/misc-pod/"
  when: item.state == 'file'

- name: "Misc: systemd daemon reload"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: "Misc: Start network service"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: misc-network.service
    enabled: true
    state: restarted
    scope: user
  when: misc_network_enabled

- name: "Misc: Start pod service"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: misc-pod.service
    enabled: true
    state: restarted
    scope: user

- name: "Misc: Enable podman-auto-update timer"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    enabled: true
    state: started
    scope: user
