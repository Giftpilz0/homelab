---
podman_user: "{{ ansible_user }}"

# Proxy
misc_proxy_enabled: false
misc_proxy_http: ""
misc_proxy_https: ""
misc_proxy_no_proxy: ""
misc_proxy_env: "{{ (['https_proxy=' ~ misc_proxy_https] + (['http_proxy=' ~ misc_proxy_http] if misc_proxy_http else []) + (['no_proxy=' ~ misc_proxy_no_proxy] if misc_proxy_no_proxy else [])) if misc_proxy_enabled else [] }}"

# Network
misc_network_enabled: true
misc_network_driver: "bridge"
misc_network_internal: false

# Network to join even when _network_enabled: false
misc_network_name: "misc-internal"

# Bind to primary interface so misc ports are externally reachable (no traefik).
# _bind_ip and _port_map are independent: override _bind_ip alone to change
# where it's exposed, or _port_map alone ("host_port:container_port") to
# change which ports -- no need to redefine both together.
misc_bind_ip: "{{ ansible_facts['default_ipv4']['address'] }}"
misc_port_map_enabled: true
misc_port_map:
  - "8080:8080"

# Build
misc_version: "latest"
misc_commit: "db16ab7ca40f6e1e98e6e7a3947fb9e2aa04f527"

# Autoupdate
misc_autoupdate: true

# Environment
misc_environment_vars:
  TZ: "Europe/Berlin"
  LOGLEVEL: "INFO"
  PORT: 8080
