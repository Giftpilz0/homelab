---
- name: "Keycloak: Provision postgresql database"
  ansible.builtin.include_role:
    name: giftpilz0.container.postgresql
  vars:
    postgresql_network_name: "{{ keycloak_network_name }}"
    postgresql_db_name: "{{ keycloak_db_name }}"
    postgresql_db_user: "{{ keycloak_db_user }}"
    postgresql_db_password: "{{ keycloak_db_password }}"

- name: "Keycloak: Create Podman config directory"
  become: true
  ansible.builtin.file:
    path: /etc/containers/containers.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Keycloak: Deploy podman proxy configuration"
  become: true
  ansible.builtin.template:
    src: "keycloak-pod/proxy.conf.j2"
    dest: "/etc/containers/containers.conf.d/proxy.conf"
    owner: root
    group: root
    mode: "0644"
  when: keycloak_proxy_enabled

- name: "Keycloak: Delete quadlet directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/keycloak-pod"
    state: absent

- name: "Keycloak: Enable lingering"
  become: true
  ansible.builtin.command: loginctl enable-linger {{ podman_user }}
  changed_when: true

- name: "Keycloak: Configure unprivileged port range for rootless containers"
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/99-rootless-ports.conf
    reload: true

- name: "Keycloak: Create quadlet directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0755"

- name: "Keycloak: Create directory structure"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/{{ item.path }}"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "{{ item.mode }}"
  with_community.general.filetree: "templates/"
  when: item.state == 'directory'

- name: "Keycloak: Template quadlet files"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/home/{{ podman_user }}/.config/containers/systemd/{{ item.path }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "{{ item.mode }}"
  with_community.general.filetree: "templates/"
  when: item.state == 'file'

- name: "Keycloak: Create config directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/keycloak-pod/config"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0755"

- name: "Keycloak: Copy theme jar"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.copy:
    src: "files/config/keycloak-theme-for-kc-all-other-versions.jar"
    dest: "/home/{{ podman_user }}/.config/containers/systemd/keycloak-pod/config/keycloak-theme.jar"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0644"

- name: "Keycloak: systemd daemon reload"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: "Keycloak: Start network service"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: keycloak-network.service
    enabled: true
    state: restarted
    scope: user
  when: keycloak_network_enabled

- name: "Keycloak: Start pod service"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: keycloak-pod.service
    enabled: true
    state: restarted
    scope: user

- name: "Keycloak: Enable podman-auto-update timer"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    enabled: true
    state: started
    scope: user

- name: "Keycloak: Configure traefik"
  ansible.builtin.include_role:
    name: giftpilz0.container.traefik
  when: traefik_http_services is defined or traefik_tcp_services is defined
