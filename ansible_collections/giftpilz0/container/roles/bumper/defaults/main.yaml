---
podman_user: "{{ ansible_user }}"

# Proxy
bumper_proxy_enabled: false
bumper_proxy_http: ""
bumper_proxy_https: ""
bumper_proxy_no_proxy: ""
bumper_proxy_env: "{{ (['https_proxy=' ~ bumper_proxy_https] + (['http_proxy=' ~ bumper_proxy_http] if bumper_proxy_http else []) + (['no_proxy=' ~ bumper_proxy_no_proxy] if bumper_proxy_no_proxy else [])) if bumper_proxy_enabled else [] }}"

# Network
bumper_network_enabled: true
bumper_network_driver: "bridge"
bumper_network_internal: false

# Network to join even when _network_enabled: false
bumper_network_name: "bumper-internal"

# Bind to primary interface so bumper ports are externally reachable (no traefik).
# _bind_ip and _port_map are independent: override _bind_ip alone to change
# where it's exposed, or _port_map alone ("host_port:container_port") to
# change which ports -- no need to redefine both together.
bumper_bind_ip: "{{ ansible_facts['default_ipv4']['address'] }}"
bumper_port_map_enabled: true
bumper_port_map:
  - "443:443"
  - "1883:1883"
  - "5223:5223"
  - "8007:8007"
  - "8443:8443"

# Build
bumper_version: "latest"
bumper_commit: "4438eb5e9ffa31b60385052102da68a3a18bf4b7"

# Autoupdate
bumper_autoupdate: true

# Environment
bumper_environment_vars:
  TZ: Europe/Berlin
  WEB_SERVER_HTTPS_PORT: 8443
  WEB_SERVER_LISTEN_PORT: 8007
  MQTT_LISTEN_PORT_TLS: 443
  MQTT_LISTEN_PORT: 1883
  XMPP_LISTEN_PORT_TLS: 5223
  DEBUG_BUMPER_VERBOSE: 2
  DEBUG_BUMPER_LEVEL: "INFO"
