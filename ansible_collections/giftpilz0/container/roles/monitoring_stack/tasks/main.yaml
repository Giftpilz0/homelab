---
- name: "Monitoring Stack: Create Podman config directory"
  become: true
  ansible.builtin.file:
    path: /etc/containers/containers.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Monitoring Stack: Deploy podman proxy configuration"
  become: true
  ansible.builtin.template:
    src: "monitoring-stack-pod/proxy.conf.j2"
    dest: "/etc/containers/containers.conf.d/proxy.conf"
    owner: root
    group: root
    mode: "0644"
  when: monitoring_stack_proxy_enabled

- name: "Monitoring Stack: Delete quadlet directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/monitoring-stack-pod"
    state: absent

- name: "Monitoring Stack: Enable lingering"
  become: true
  ansible.builtin.command: loginctl enable-linger {{ podman_user }}
  changed_when: true

- name: "Monitoring Stack: Configure unprivileged port range for rootless containers"
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    sysctl_set: true
    sysctl_file: /etc/sysctl.d/99-rootless-ports.conf
    reload: true

- name: "Monitoring Stack: Create quadlet directory"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0755"

- name: "Monitoring Stack: Create directory structure"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.file:
    path: "/home/{{ podman_user }}/.config/containers/systemd/{{ item.path }}"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "{{ item.mode }}"
  with_community.general.filetree: "templates/"
  when: item.state == 'directory'

- name: "Monitoring Stack: Template quadlet files"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/home/{{ podman_user }}/.config/containers/systemd/{{ item.path }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "{{ item.mode }}"
  with_community.general.filetree: "templates/"
  when: item.state == 'file'

- name: "Monitoring Stack: Template service config files"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.template:
    src: "monitoring-stack-pod/config/{{ item }}.j2"
    dest: "/home/{{ podman_user }}/.config/containers/systemd/monitoring-stack-pod/config/{{ item }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0640"
  loop:
    - garage.toml
    - mimir.yaml
    - loki.yaml
    - perses.yaml

- name: "Monitoring Stack: Template Perses provisioning files"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.template:
    src: "monitoring-stack-pod/config/provisioning/{{ item }}.j2"
    dest: "/home/{{ podman_user }}/.config/containers/systemd/monitoring-stack-pod/config/provisioning/{{ item }}"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0640"
  loop:
    - project-default.yaml
    - global-datasource-mimir.yaml
    - global-datasource-loki.yaml
    - dashboard-infrastructure.yaml

- name: "Monitoring Stack: systemd daemon reload"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: "Monitoring Stack: Start network service"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: monitoring-stack-network.service
    enabled: true
    state: restarted
    scope: user
  when: monitoring_stack_network_enabled

- name: "Monitoring Stack: Start pod service"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: monitoring-stack-pod.service
    enabled: true
    state: restarted
    scope: user

- name: "Monitoring Stack: Enable podman-auto-update timer"
  become: true
  become_user: "{{ podman_user }}"
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    enabled: true
    state: started
    scope: user

- name: "Monitoring Stack: Run GarageHQ initialization"
  ansible.builtin.include_tasks: garage_init.yaml
  when: monitoring_stack_garage_init | bool

- name: "Monitoring Stack: Configure traefik"
  ansible.builtin.include_role:
    name: giftpilz0.container.traefik
  when: traefik_http_services is defined or traefik_tcp_services is defined
