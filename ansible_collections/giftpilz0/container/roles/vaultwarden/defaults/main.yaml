---
podman_user: "{{ ansible_user }}"

# Proxy
vaultwarden_proxy_enabled: false
vaultwarden_proxy_http: ""
vaultwarden_proxy_https: ""
vaultwarden_proxy_no_proxy: ""
vaultwarden_proxy_env: "{{ (['https_proxy=' ~ vaultwarden_proxy_https] + (['http_proxy=' ~ vaultwarden_proxy_http] if vaultwarden_proxy_http else []) + (['no_proxy=' ~ vaultwarden_proxy_no_proxy] if vaultwarden_proxy_no_proxy else [])) if vaultwarden_proxy_enabled else [] }}"

# Network
vaultwarden_network_enabled: true
vaultwarden_network_driver: "bridge"
vaultwarden_network_internal: false

# Network to join even when _network_enabled: false
vaultwarden_network_name: "vaultwarden-internal"

# Port mapping: host_port:container_port
# Bind to loopback so only traefik (via pasta splice) can reach the service.
vaultwarden_bind_ip: "127.0.0.1"
vaultwarden_port_map_enabled: true
vaultwarden_port_map:
  - "{{ vaultwarden_bind_ip }}:80:80"

# Pasta TCP ports to forward into traefik's container namespace
vaultwarden_pasta_tcp_ports:
  - 80

# Versions
vaultwarden_version: "1.35.7-alpine"

# Autoupdate
vaultwarden_autoupdate: true

# Environment
vaultwarden_environment_vars:
  DOMAIN: "{{ vaultwarden_domain }}"
  ADMIN_TOKEN: "{{ vaultwarden_admin_token }}"
  ROCKET_PORT: "80"
