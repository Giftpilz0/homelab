---
podman_user: "{{ ansible_user }}"

# Proxy
traefik_proxy_enabled: false
traefik_proxy_http: ""
traefik_proxy_https: ""
traefik_proxy_no_proxy: ""
traefik_proxy_env: "{{ (['https_proxy=' ~ traefik_proxy_https] + (['http_proxy=' ~ traefik_proxy_http] if traefik_proxy_http else []) + (['no_proxy=' ~ traefik_proxy_no_proxy] if traefik_proxy_no_proxy else [])) if traefik_proxy_enabled else [] }}"

# Network
# Traefik's own network. Also joins traefik_networks below to reach backends.
traefik_network_enabled: true
traefik_network_driver: "bridge"
traefik_network_internal: false
traefik_network_name: "traefik-internal"

# Version
# renovate: datasource=docker depName=traefik
traefik_version: "v3.7.5"

# Autoupdate
traefik_autoupdate: true

# Bind IP for traefik published ports. Defaults to the primary interface so that
# traefik does not claim loopback (127.0.0.1), leaving it free for service pods.
traefik_bind_ip: "{{ ansible_facts['default_ipv4']['address'] }}"

# Internal ports traefik listens on inside its container. These are remapped to the
# standard ports (80/443) via PublishPort.
traefik_http_internal_port: 80
traefik_https_internal_port: 443

# Podman networks traefik should join, in addition to its own default network.
# Traefik no longer runs on pasta -- it is a plain bridge-networked container like
# every other service, and reaches backends directly over these shared Podman
# networks using aardvark-dns (container name resolution), instead of splicing
# host loopback ports via pasta -T.
#
# Each entry must be the *role name* of a service whose <role>.network quadlet
# unit should be joined (e.g. "homeassistant" joins the network defined by
# homeassistant.network / homeassistant_network_name). Referencing the quadlet
# unit name (rather than the raw network name) makes systemd start that
# service's -network.service before traefik-pod.service, so startup order is
# correct on boot as well as on first deploy.
#
# Example:
#   traefik_networks:
#     - forgejo
#     - opencloud
#
# In traefik_http_services / traefik_tcp_services, point "servers" at the
# backend's pod name and *pod* port (not 127.0.0.1 and not the
# host-published port), e.g. "http://forgejo-pod:3000".
traefik_networks: []

# Environment
traefik_environment_vars: {}

# traefik_environment_vars:
#   CLOUDFLARE_DNS_API_TOKEN: "example"

# ACME
traefik_acme_enabled: true
traefik_acme_email: ""
traefik_acme_ca_server: "https://acme-v02.api.letsencrypt.org/directory"
traefik_acme_challenge_type: http # dns, http or tls
traefik_acme_dns_provider: "cloudflare"
traefik_acme_eab_enabled: false
traefik_acme_eab_kid: ""
traefik_acme_eab_hmac: ""

# Logging
traefik_log_level: "WARN"
traefik_log_format: "json"

traefik_access_log_format: "json"
traefik_access_log_buffer_size: 10

# Transport
traefik_transport_timeouts_enabled: false
traefik_transport_read_timeout: "12h"
traefik_transport_write_timeout: "12h"
traefik_transport_idle_timeout: "3m"

# HTTP/3 (QUIC) on the websecure entrypoint. Also publishes UDP 443.
traefik_http3_enabled: true
# The port advertised in the alt-svc header. Must match the external (host-side)
# port clients connect to — important when traefik_https_internal_port differs
# from the host-published port (e.g. internal 8843 published as 443).
traefik_http3_advertised_port: 443

# HTTP to HTTPS redirect (entrypoint-level global redirect)
traefik_http_redirect_https: true

# Redirect middlewares (path or regex-based HTTP redirects)
# Each entry renders as a traefik redirectRegex middleware.
# Simple form: from/to  (useful for path redirects like / → /ui)
# Full form:   regex/replacement  (for complex URL rewrites)
#
# traefik_middlewares_redirect:
#   root-to-ui:
#     from: "^/$"
#     to: "/ui"
#     permanent: false
#   non-www-to-www:
#     regex: "^https?://example\\.com/(.*)"
#     replacement: "https://www.example.com/${1}"
#     permanent: true
traefik_middlewares_redirect: {}

# Custom middlewares (arbitrary traefik middleware definitions)
# traefik_custom_middlewares:
#   auth-basic:
#     basicAuth:
#       users:
#         - "admin:$2y$10$..."
traefik_custom_middlewares: {}

# TCP entrypoints
# traefik_tcp_entrypoints:
#   - name: mysql
#     port: 3306
#   - name: postgres
#     port: 5432

# HTTP services
# traefik_http_services:
