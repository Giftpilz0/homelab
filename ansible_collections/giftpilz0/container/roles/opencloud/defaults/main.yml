---
podman_user: "{{ ansible_user }}"

# Proxy
opencloud_proxy_enabled: false
opencloud_proxy_http: ""
opencloud_proxy_https: ""
opencloud_proxy_no_proxy: ""
opencloud_proxy_env: "{{ (['https_proxy=' ~ opencloud_proxy_https] + (['http_proxy=' ~ opencloud_proxy_http] if opencloud_proxy_http else []) + (['no_proxy=' ~ opencloud_proxy_no_proxy] if opencloud_proxy_no_proxy else [])) if opencloud_proxy_enabled else [] }}"

# Network
opencloud_network_enabled: true
opencloud_network_driver: "bridge"
opencloud_network_internal: false

# Network to join even when _network_enabled: false
opencloud_network_name: "opencloud-internal"

# Envoy
opencloud_envoy_enabled: true
opencloud_envoy_version: "1.37-latest"

# Port mapping: host_port:container_port
opencloud_port_map_enabled: true
opencloud_port_map:
  - "9200:9200"

# Versions
opencloud_version: "5"

# Autoupdate
opencloud_autoupdate: true

# Environment
opencloud_domain: ""
opencloud_admin_password: ""
opencloud_log_level: "info"

opencloud_environment_vars:
  IDM_ADMIN_PASSWORD: "{{ opencloud_admin_password }}"
  OPEN_CLOUD_LOG_LEVEL: "{{ opencloud_log_level }}"
  OC_URL: "{{ opencloud_domain }}"
  OC_CORS_ALLOW_ORIGINS: "{{ opencloud_domain }}"
  PROXY_HTTP_ADDR: "{{ '0.0.0.0:9200' if not opencloud_envoy_enabled else '127.0.0.1:9200' }}"
  PROXY_TLS: false
  FRONTEND_ARCHIVER_MAX_SIZE: 4294967296
  THUMBNAILS_MAX_CONCURRENT_REQUESTS: 64

# OIDC Clients Configuration
opencloud_standard_clients:
  - id: web
    name: "OpenCloud Web App"
    trusted: true
    secret: ""
    redirect_uris:
      - "{{ opencloud_domain }}/"
      - "{{ opencloud_domain }}/oidc-callback.html"
      - "{{ opencloud_domain }}/oidc-silent-redirect.html"
    post_logout_redirect_uris: []
    origins:
      - "{{ opencloud_domain }}"
    application_type: ""

  - id: OpenCloudDesktop
    name: "OpenCloud Desktop Client"
    trusted: false
    secret: ""
    redirect_uris:
      - "http://127.0.0.1"
      - "http://localhost"
    post_logout_redirect_uris: []
    origins: []
    application_type: "native"

  - id: OpenCloudAndroid
    name: "OpenCloud Android App"
    trusted: false
    secret: ""
    redirect_uris:
      - "oc://android.opencloud.eu"
    post_logout_redirect_uris:
      - "oc://android.opencloud.eu"
    origins: []
    application_type: "native"

  - id: OpenCloudIOS
    name: "OpenCloud iOS App"
    trusted: false
    secret: ""
    redirect_uris:
      - "oc://ios.opencloud.eu"
    post_logout_redirect_uris:
      - "oc://ios.opencloud.eu"
    origins: []
    application_type: "native"

  # Custom OIDC Clients
  # opencloud_custom_clients:
  # - id: forgejo
  #   name: "forgejo"
  #   trusted: false
  #   secret: "{{ forgejo_oauth_client_secret }}"
  #   redirect_uris:
  #     - "https://{{ forgejo_domain }}/user/oauth2/opencloud/callback"
  #   post_logout_redirect_uris: []
  #   origins:
  #     - "https://{{ forgejo_domain }}"
  #   application_type: "web"

# Merge OIDC clients
opencloud_oidc_clients: "{{ opencloud_standard_clients + opencloud_custom_clients }}"
