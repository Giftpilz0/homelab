---
podman_user: "{{ ansible_user }}"

# Proxy
mosquitto_proxy_enabled: false
mosquitto_proxy_http: ""
mosquitto_proxy_https: ""
mosquitto_proxy_no_proxy: ""
mosquitto_proxy_env: "{{ (['https_proxy=' ~ mosquitto_proxy_https] + (['http_proxy=' ~ mosquitto_proxy_http] if mosquitto_proxy_http else []) + (['no_proxy=' ~ mosquitto_proxy_no_proxy] if mosquitto_proxy_no_proxy else [])) if mosquitto_proxy_enabled else [] }}"

# Network
mosquitto_network_enabled: true
mosquitto_network_driver: "bridge"
mosquitto_network_internal: false

# Network to join even when _network_enabled: false
mosquitto_network_name: "mosquitto-internal"

# Port mapping: host_port:container_port
# Bind to loopback so only traefik (via pasta splice) can reach the service.
mosquitto_bind_ip: "127.0.0.1"
mosquitto_port_map_enabled: true
mosquitto_port_map:
  - "{{ mosquitto_bind_ip }}:1883:1883"
  - "{{ mosquitto_bind_ip }}:9001:9001"

# Pasta TCP ports to forward into traefik's container namespace
mosquitto_pasta_tcp_ports:
  - 1883
  - 9001

# Versions
mosquitto_version: "2"

# Autoupdate
mosquitto_autoupdate: true

# Environment
mosquitto_environment_vars: {}

# Config
mosquitto_pwfile_users: {}
