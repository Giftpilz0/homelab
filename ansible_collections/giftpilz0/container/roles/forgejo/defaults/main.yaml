---
podman_user: "{{ ansible_user }}"

# Proxy
forgejo_proxy_enabled: false
forgejo_proxy_http: ""
forgejo_proxy_https: ""
forgejo_proxy_no_proxy: ""
forgejo_proxy_env: "{{ (['https_proxy=' ~ forgejo_proxy_https] + (['http_proxy=' ~ forgejo_proxy_http] if forgejo_proxy_http else []) + (['no_proxy=' ~ forgejo_proxy_no_proxy] if forgejo_proxy_no_proxy else [])) if forgejo_proxy_enabled else [] }}"

# Network
forgejo_network_enabled: true
forgejo_network_driver: "bridge"
forgejo_network_internal: false

# Network to join even when _network_enabled: false
forgejo_network_name: "forgejo-internal"

# Optional: expose this service directly on the host, bypassing Traefik.
# Not required for Traefik to reach it -- Traefik connects directly over the
# shared Podman network using the container name and container port.
# _bind_ip and _port_map are independent: override _bind_ip alone to change
# where it's exposed, or _port_map alone ("host_port:container_port") to
# change which ports -- no need to redefine both together.
forgejo_bind_ip: "127.0.0.1"
forgejo_port_map_enabled: true
forgejo_port_map:
  - "3000:3000"
  - "2222:2222"

# Versions
# renovate: datasource=docker depName=codeberg.org/forgejo/forgejo
forgejo_version: "16.0.0"

# Autoupdate
forgejo_autoupdate: true

# Environment
# Database: forgejo uses the shared giftpilz0.container.postgresql role as its
# database backend (a separate pod on the same Podman network) rather than an
# embedded postgres container. Point forgejo_db_host at that pod/container name.
forgejo_db_host: "postgresql-pod"
forgejo_db_name: "forgejo"
forgejo_db_user: "forgejo"
forgejo_db_password: ""
forgejo_domain: ""
forgejo_oauth_client_id: ""
forgejo_oauth_client_secret: ""
forgejo_oauth_domain: ""
forgejo_oauth_name: ""
forgejo_oauth_admin_group: "forgejo-admin"

forgejo_environment_vars:
  USER_UID: "1000"
  USER_GID: "1000"

  # DEFAULT section
  APP_NAME: "Forgejo"
  APP_SLOGAN: ""

  # Server section
  FORGEJO__server__DOMAIN: "{{ forgejo_domain }}"
  FORGEJO__server__ROOT_URL: "https://{{ forgejo_domain }}/"
  FORGEJO__server__PROTOCOL: "http"
  FORGEJO__server__HTTP_PORT: 3000
  FORGEJO__server__SSH_PORT: 2222

  FORGEJO__server__OFFLINE_MODE: false

  # Log section
  FORGEJO__log__LEVEL: "{{ forgejo_log_level | default('Info') }}"

  # Database section
  FORGEJO__database__DB_TYPE: "postgres"
  FORGEJO__database__HOST: "{{ forgejo_db_host }}:5432"
  FORGEJO__database__NAME: "{{ forgejo_db_name }}"
  FORGEJO__database__USER: "{{ forgejo_db_user }}"
  FORGEJO__database__PASSWD: "{{ forgejo_db_password }}"

  # Security section
  FORGEJO__security__LOGIN_REMEMBER_DAYS: "14"
  FORGEJO__security__INSTALL_LOCK: true

  # Service Configuration
  FORGEJO__service__DISABLE_REGISTRATION: true
  FORGEJO__service__ALLOW_ONLY_EXTERNAL_REGISTRATION: true
  FORGEJO__service__SHOW_REGISTRATION_BUTTON: false
  FORGEJO__service__ENABLE_INTERNAL_SIGNIN: true

  # OAuth2 Client section
  FORGEJO__oauth2_client__ENABLE_AUTO_REGISTRATION: true
  FORGEJO__oauth2_client__USERNAME: "preferred_username"
  FORGEJO__oauth2_client__UPDATE_AVATAR: true
  FORGEJO__oauth2_client__ACCOUNT_LINKING: "auto"
  FORGEJO__oauth2_client__OPENID_CONNECT_SCOPES: '"profile email"'
  FORGEJO__oauth2_client__ADMIN_GROUP: "{{ forgejo_oauth_admin_group }}"

  # OpenID section
  FORGEJO__openid__ENABLE_OPENID_SIGNIN: false
  FORGEJO__openid__ENABLE_OPENID_SIGNUP: false

  # OAuth Source Configuration
  OAUTH_NAME: "{{ forgejo_oauth_name }}"
  OAUTH_CLIENT_ID: "{{ forgejo_oauth_client_id }}"
  OAUTH_CLIENT_SECRET: "{{ forgejo_oauth_client_secret }}"
  OAUTH_DISCOVERY_URL: "https://{{ forgejo_oauth_domain }}/.well-known/openid-configuration"
  OAUTH_SCOPES: "openid profile email groups"
  OAUTH_ADMIN_GROUP: "{{ forgejo_oauth_admin_group }}"
