---
# tasks file for podman

######################################
### packages

- name: "Podman: Manage dependencies"
  become: true
  ansible.builtin.package:
    name: "{{ podman_package }}"
    state: "{{ podman_package_state }}"

######################################
### jobs

- name: "Podman: Enable lingering"
  become: true
  ansible.builtin.command: loginctl enable-linger {{ podman_user }}
  register: podman_lingering
  changed_when: podman_lingering.rc != 0

- name: "Podman: Ensure folder exists"
  become: true
  ansible.builtin.file:
    path: "{{ podman_kube_path }}"
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    recurse: true
    mode: "0755"

- name: "Podman: Create user systemd directory"
  become: true
  ansible.builtin.file:
    path: /home/{{ podman_user }}/.config/systemd/user
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    recurse: true
    mode: "0755"

- name: "Podman: Create user containers.conf.d directory"
  become: true
  ansible.builtin.file:
    path: /home/{{ podman_user }}/.config/containers/containers.conf.d
    state: directory
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    recurse: true
    mode: "0755"

- name: "Podman: Configure rootless port forwarder"
  become: true
  ansible.builtin.template:
    src: "containers.conf.d/networking.conf.j2"
    dest: "/home/{{ podman_user }}/.config/containers/containers.conf.d/networking.conf"
    owner: "{{ podman_user }}"
    group: "{{ podman_user }}"
    mode: "0644"
  when: podman_rootless_port_forwarder | length > 0

######################################
### services

- name: "Podman: Systemd reread configs"
  become_user: "{{ podman_user }}"
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: "Podman: Manage services"
  become_user: "{{ podman_user }}"
  become: true
  ansible.builtin.systemd:
    name: "{{ podman_service_name }}"
    state: "{{ podman_service_state }}"
    enabled: "{{ podman_service_enabled }}"
    scope: user
  when:
    - podman_package_state != 'absent'
