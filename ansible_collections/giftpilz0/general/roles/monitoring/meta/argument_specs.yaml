          - reloaded
          - restarted
          - started
          - stopped
        description: monitoring_agent_service_state

      monitoring_agent_service_enabled:
        type: bool
        required: false
        description: monitoring_agent_service_enabled

      monitoring_agent_config_remoteserver_loki:
