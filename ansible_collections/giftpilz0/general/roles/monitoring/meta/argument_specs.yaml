        elements: str
        required: false
        description: monitoring_alloy_loki_files_paths

      monitoring_alloy_loki_journal_enabled:
        type: bool
        required: false
        description: monitoring_alloy_loki_journal_enabled

      monitoring_alloy_blackbox_enabled:
        type: bool
        required: false
        description: monitoring_alloy_blackbox_enabled

